<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QHRR Processes</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-page="processes">
    <header class="topbar">
      <div>
        <p class="eyebrow">QHRR Control</p>
        <h1>Processes</h1>
      </div>
      <div class="status-strip">
        <span id="ifaceBadge" class="badge muted">iface</span>
        <span id="socketBadge" class="badge muted">socket</span>
        <span id="txBadge" class="badge danger">TX LOCKED</span>
      </div>
    </header>

    <nav class="menubar" aria-label="Dashboard views">
      <a class="menu-link" href="/">Overview</a>
      <a class="menu-link active" href="/processes">Processes</a>
      <a class="menu-link" href="/shm">SHM Data</a>
    </nav>

    <main class="dashboard process-grid">
      <section class="panel process-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Runtime</p>
            <h2>Process Status</h2>
          </div>
          <span id="processSummaryBadge" class="badge muted">waiting</span>
        </div>
        <div id="processTiles" class="process-tiles"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>

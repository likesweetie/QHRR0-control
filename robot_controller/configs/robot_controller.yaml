robot_controller:
  name: qhrr_robot_controller
  control_hz: 500
  startup_timeout_s: 5.0
  shutdown_timeout_s: 2.0

shm:
  cleanup_stale_on_start: true
  unlink_on_shutdown: true

  mit_command:
    name: qhrr_mit_command
    motor_count: 3

  robot_state:
    name: qhrr_robot_state
    enabled: false

can:
  interface: vcan0
  daemon_process: ""
  command_source: shm
  command_timeout_s: 0.05
  direct_socketcan: true
  bringup_delay_s: 0.01

  motors:
    ids: [0x141, 0x142, 0x143]
    enter_on_start: true
    exit_on_shutdown: true
    set_zero_on_start: false

  mit_limits:
    position_rad: 12.5
    velocity_rad_s: 45.0
    kp: 500.0
    kd: 5.0
    torque_ff_nm: 33.0

processes: []

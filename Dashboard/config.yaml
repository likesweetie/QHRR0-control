dashboard:
  host: 127.0.0.1
  port: 8000
  state_hz: 24
  transmit_ids:
    - label: E2Box request
      can_id: 0x221
      payload: "03"
    - label: RL hip roll
      can_id: 0x141
      payload: "C100000000000000"
    - label: RL hip pitch
      can_id: 0x142
      payload: "C100000000000000"
    - label: RL knee pitch
      can_id: 0x143
      payload: "C100000000000000"


can:
  iface: vcan0
  bitrate: 1000000
  motor_id_base: 0
  motor_count: 3
  bus_window_s: 1.0
  heartbeat_window_s: 1.0
  node_timeout_s: 0.25
  stuff_factor: 1.15

imu:
  request_id: 0x221
  quat_id: 0x2A1
  gyro_id: 0x321
  default_poll_hz: 400

spg:
  feedback_position_max_rad: 12.56
  iq_full_scale_count: 2048.0
  iq_full_scale_current_a: 33.0
  default_mit_poll_hz: 500

safety:
  tx_enabled_by_default: false
  allow_motor_commands: true


actuators:
  - name: RL_hip_roll
    mujoco_joint: RL_hip_roll
    mujoco_actuator: RL_hip_roll
    motor_id: 0
    can_id: 0x141
    sign: 1.0
    offset_rad: 0.0

  - name: RL_hip_pitch
    mujoco_joint: RL_hip_pitch
    mujoco_actuator: RL_hip_pitch
    motor_id: 1
    can_id: 0x142
    sign: 1.0
    offset_rad: 0.0
    
  - name: RL_knee_pitch
    mujoco_joint: RL_knee_pitch
    mujoco_actuator: RL_knee_pitch
    motor_id: 2
    can_id: 0x143
    sign: 1.0
    offset_rad: 0.0